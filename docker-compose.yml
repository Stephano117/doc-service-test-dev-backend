services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/doc-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONCURRENCY=50
      - PDF_TIMEOUT_MS=5000
      - MAX_RETRIES=3
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: node dist/workers/queueWorker.js
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/doc-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONCURRENCY=50
      - PDF_TIMEOUT_MS=5000
      - MAX_RETRIES=3
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data: